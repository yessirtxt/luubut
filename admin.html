<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản Lý Lưu Bút - Private</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }
        
        /* Màn hình khóa đăng nhập */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50; display: flex; justify-content: center;
            align-items: center; z-index: 999; flex-direction: column; gap: 15px;
        }
        #login-box {
            background: white; padding: 30px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center;
            display: flex; flex-direction: column; gap: 15px; width: 320px;
        }
        #login-box h2 { color: #333; font-size: 1.3rem; }
        #login-box input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; text-align: center; }
        #login-box button { background: #6c5ce7; color: white; border: none; padding: 10px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        #login-box button:hover { background: #5b4cc4; }
        #error-msg { color: #ff7675; font-size: 0.9rem; display: none; }

        /* Giao diện chính sau khi đăng nhập (Mặc định ẩn đi) */
        #main-content { display: none; width: 100%; height: 100%; }
        
        /* Cấu trúc giao diện bên trong */
        #sidebar {
            width: 300px; background: #ffffff; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 10;
        }
        #sidebar h3 { color: #333; font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        #user-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; list-style: none; }
        .user-item { padding: 12px; background: #f8f9fa; border-radius: 6px; cursor: pointer; transition: 0.2s; border: 1px solid #eee; }
        .user-item:hover { background: #e8f0fe; border-color: #1a73e8; }
        .user-item.active { background: #1a73e8; color: white; font-weight: bold; }
        .user-time { font-size: 0.75rem; color: #888; margin-top: 4px; }
        .user-item.active .user-time { color: #e8f0fe; }

        #notebook-container { flex: 1; padding: 40px; overflow: auto; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px; }
        #notebook-title { font-size: 1.5rem; color: #333; font-weight: bold; }
        #notebook {
            width: 850px; height: 550px; background-color: #fcfaf2;
            background-image: linear-gradient(#e8e6dd 1px, transparent 1px); background-size: 100% 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-radius: 4px; position: relative; border-left: 15px solid #6c5ce7;
        }
        .preview-item { position: absolute; transform: translate(-50%, -50%); user-select: none; }
        .preview-text { font-size: 16px; color: #2c3e50; font-weight: 500; padding: 5px; word-wrap: break-word; white-space: nowrap; }
        .preview-sticker { font-size: 3rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div id="login-box">
            <h2>HÒM THƯ BÍ MẬT 🔐</h2>
            <input type="password" id="password-input" placeholder="Nhập mật khẩu của bro...">
            <div id="error-msg">Sai mật khẩu rồi bro ơi! ❌</div>
            <button id="btn-login">MỞ KHÓA</button>
        </div>
    </div>

    <div id="main-content">
        <div id="sidebar">
            <h3>DANH SÁCH LƯU BÚT</h3>
            <ul id="user-list"></ul>
        </div>
        <div id="notebook-container">
            <div id="notebook-title">Chọn một người bên trái để xem lưu bút</div>
            <div id="notebook"></div>
        </div>
    </div>

    <script>
        // ĐẶT MẬT KHẨU CỦA BRO TẠI ĐÂY (Thay đổi tùy ý nhé)
        const MY_PASSWORD = "Adu2026"; 
        
        // ĐƯỜNG LINK GOOGLE APPS SCRIPT CỦA BRO
        const scriptUrl = 'https://script.google.com/macros/s/AKfycbwA1xSF50puLXA5Vj5N31Lt6Ww8h_X7n8v45hFcQNZl-QPABSO5dGV2Hz9l2kfNGGm1xA/exec';

        const loginScreen = document.getElementById('login-screen');
        const mainContent = document.getElementById('main-content');
        const passwordInput = document.getElementById('password-input');
        const btnLogin = document.getElementById('btn-login');
        const errorMsg = document.getElementById('error-msg');
        
        const userListElement = document.getElementById('user-list');
        const notebookElement = document.getElementById('notebook');
        const notebookTitle = document.getElementById('notebook-title');

        // XỬ LÝ ĐĂNG NHẬP
        function checkPassword() {
            if (passwordInput.value === MY_PASSWORD) {
                loginScreen.style.display = 'none'; // Ẩn màn hình khóa
                mainContent.style.display = 'flex'; // Hiện trang admin
                loadData(); // Gọi hàm tải dữ liệu từ Google Sheet
            } else {
                errorMsg.style.display = 'block'; // Hiện báo lỗi
                passwordInput.value = "";
                passwordInput.focus();
            }
        }

        btnLogin.onclick = checkPassword;
        passwordInput.onkeypress = (e) => { if(e.key === 'Enter') checkPassword(); };

        // HÀM TẢI DỮ LIỆU (Chỉ chạy sau khi gõ đúng pass)
        function loadData() {
            userListElement.innerHTML = "<li>Đang tải thư...</li>";
            
            fetch(scriptUrl)
                .then(res => res.json())
                .then(data => {
                    userListElement.innerHTML = "";
                    if(data.length === 0) { notebookTitle.innerText = "Chưa có ai gửi lưu bút cả bro ơi!"; return; }

                    data.reverse().forEach((msg) => {
                        const li = document.createElement('li');
                        li.className = 'user-item';
                        const date = new Date(msg.timestamp);
                        const timeStr = `${date.getHours()}:${date.getMinutes()} - ${date.getDate()}/${date.getMonth()+1}`;

                        li.innerHTML = `<div>${msg.name}</div><div class="user-time">${timeStr}</div>`;
                        li.onclick = () => {
                            document.querySelectorAll('.user-item').forEach(item => item.classList.remove('active'));
                            li.classList.add('active');
                            renderNotebook(msg);
                        };
                        userListElement.appendChild(li);
                    });
                })
                .catch(err => { userListElement.innerHTML = "<li>Lỗi tải dữ liệu!</li>"; });
        }

        function renderNotebook(msg) {
            notebookElement.innerHTML = "";
            notebookTitle.innerText = `Lưu bút của: ${msg.name}`;
            try {
                const canvasData = JSON.parse(msg.canvasData);
                canvasData.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.style.left = item.x; div.style.top = item.y;
                    if (item.type === 'text') { div.className += ' preview-text'; div.innerText = item.val; } 
                    else if (item.type === 'sticker') { div.className += ' preview-sticker'; div.innerText = item.val; }
                    notebookElement.appendChild(div);
                });
            } catch (e) { notebookElement.innerHTML = "<div style='padding:20px; color:red;'>Lỗi phục dựng!</div>"; }
        }
    </script>
</body>
</html>
