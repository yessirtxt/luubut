<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lưu Bút Góc Bàn Chill</title>
    <style>
        /* CSS Reset cơ bản */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }

        /* THANH CÔNG CỤ (SIDEBAR) - Giữ nguyên như cũ */
        #sidebar {
            width: 250px; background: #ffffff; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 10;
        }
        #sidebar h3 { color: #333; font-size: 1.1rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .sticker-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .sticker-item { font-size: 2rem; text-align: center; cursor: grab; padding: 5px; background: #f8f9fa; border-radius: 8px; transition: transform 0.2s; user-select: none; }
        .sticker-item:hover { transform: scale(1.1); background: #e9ecef; }
        .instructions { font-size: 0.85rem; color: #666; line-height: 1.4; }

        /* KHU VỰC CHÍNH - BACKGROUND MẶT BÀN GỖ (image_11.png) */
        #notebook-container {
            flex: 1; padding: 0; overflow: auto; display: flex; justify-content: center; align-items: center;
            background-image: url('image_11.png'); /* SỬ DỤNG ẢNH MẶT BÀN LÀM NỀN */
            background-size: cover; background-position: center;
        }

        /* KHU VỰC QUYỂN SỔ - BACKGROUND QUYỂN SỔ XOẮN (image_12.png) */
        #notebook {
            width: 850px; height: 550px;
            background-image: url('image_12.png'); /* SỬ DỤNG ẢNH QUYỂN SỔ LÀM NỀN TRONG KHUNG */
            background-size: 100% 100%; /* Đảm bảo ảnh quyển sổ vừa vặn khung */
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-radius: 4px;
            position: relative; cursor: crosshair;
            /* Xóa hiệu ứng dòng kẻ CSS cũ */
            /* border-left: 15px solid #bdc3c7; */ /* Xóa gáy sổ CSS cũ */
        }

        /* Các phần tử được thả vào sổ (text/sticker) - Giữ nguyên như cũ */
        .placed-item { position: absolute; transform: translate(-50%, -50%); animation: popIn 0.2s ease-out; cursor: move; user-select: none; }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0); } 100% { transform: translate(-50%, -50%) scale(1); } }
        .placed-text { background: transparent; border: none; font-size: 16px; color: #2c3e50; font-weight: 500; padding: 5px; outline: none; min-width: 50px; max-width: 200px; word-wrap: break-word; }
        .placed-text:focus { background: rgba(241, 196, 15, 0.2); border-radius: 4px; }
        .placed-sticker { font-size: 3rem; }
        .delete-btn { position: absolute; top: -10px; right: -10px; background: #ff7675; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; display: none; align-items: center; justify-content: center; }
        .placed-item:hover .delete-btn { display: flex; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>STIKER CỦA BRO</h3>
        <div class="sticker-box">
            <div class="sticker-item" draggable="true" data-sticker="🔥">🔥</div>
            <div class="sticker-item" draggable="true" data-sticker="✨">✨</div>
            <div class="sticker-item" draggable="true" data-sticker="❤️">❤️</div>
            <div class="sticker-item" draggable="true" data-sticker="👑">👑</div>
            <div class="sticker-item" draggable="true" data-sticker="🚀">🚀</div>
            <div class="sticker-item" draggable="true" data-sticker="🐧">🐧</div>
        </div>
        <h3>HƯỚNG DẪN</h3>
        <div class="instructions">
            <p>1. <b>Viết chữ:</b> Click đúp (Double click) vào vị trí bất kỳ trên sổ để viết lời chúc.</p><br>
            <p>2. <b>Dán Sticker:</b> Kéo sticker từ menu bên trái và thả vào vị trí bất kỳ trên sổ.</p><br>
            <p>3. <b>Xóa:</b> Di chuột vào chữ/sticker rồi bấm nút <b>x</b> màu đỏ.</p>
        </div>
    </div>

    <div id="notebook-container">
        <div id="notebook">
            </div>
    </div>

    <script>
        const notebook = document.getElementById('notebook');
        const stickers = document.querySelectorAll('.sticker-item');
        let draggedStickerContent = null;
        notebook.addEventListener('dblclick', function(e) { if(e.target !== notebook) return; const rect = notebook.getBoundingClientRect(); createTextArea(e.clientX - rect.left, e.clientY - rect.top, ""); });
        function createTextArea(x, y, textValue = "") { const item = document.createElement('div'); item.className = 'placed-item'; item.style.left = `${x}px`; item.style.top = `${y}px`; const input = document.createElement('input'); input.type = 'text'; input.className = 'placed-text'; input.placeholder = 'Nhập chữ...'; input.value = textValue; const delBtn = document.createElement('button'); delBtn.className = 'delete-btn'; delBtn.innerText = 'x'; delBtn.onclick = () => item.remove(); item.appendChild(input); item.appendChild(delBtn); notebook.appendChild(item); if(!textValue) input.focus(); input.addEventListener('blur', function() { if(input.value.trim() === "") item.remove(); }); input.addEventListener('keypress', function(e) { if(e.key === 'Enter') input.blur(); }); makeElementDraggable(item); }
        stickers.forEach(sticker => { sticker.addEventListener('dragstart', function(e) { draggedStickerContent = this.getAttribute('data-sticker'); }); });
        notebook.addEventListener('dragover', function(e) { e.preventDefault(); });
        notebook.addEventListener('drop', function(e) { e.preventDefault(); if (!draggedStickerContent) return; const rect = notebook.getBoundingClientRect(); createSticker(e.clientX - rect.left, e.clientY - rect.top, draggedStickerContent); draggedStickerContent = null; });
        function createSticker(x, y, content) { const item = document.createElement('div'); item.className = 'placed-item placed-sticker'; item.style.left = `${x}px`; item.style.top = `${y}px`; item.innerText = content; const delBtn = document.createElement('button'); delBtn.className = 'delete-btn'; delBtn.innerText = 'x'; delBtn.onclick = () => item.remove(); item.appendChild(delBtn); notebook.appendChild(item); makeElementDraggable(item); }
        function makeElementDraggable(elmnt) { let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0; elmnt.onmousedown = dragMouseDown; function dragMouseDown(e) { if (e.target.className === 'delete-btn' || e.target.tagName === 'INPUT') return; e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; } function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; } function closeDragElement() { document.onmouseup = null; document.onmousemove = null; } }
    </script>
</body>
</html>
